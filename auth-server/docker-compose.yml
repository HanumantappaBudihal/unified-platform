services:
  # ─── PostgreSQL (Keycloak Database) ───
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 100
        reservations:
          memory: 128M
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak-db-secret}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-internal
    restart: unless-stopped

  # ─── Keycloak (Authentication + SSO) ───
  auth-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: auth-keycloak
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
          pids: 300
        reservations:
          memory: 512M
    command: start-dev --import-realm
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://auth-postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-db-secret}
      # Admin
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Health
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # TLS
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server.key
      KC_HTTPS_PORT: "8443"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
      - "8443:8443"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
      - ../certs:/opt/keycloak/certs:ro
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - auth-internal
      - auth-network
      - email-network
    restart: unless-stopped

volumes:
  auth-postgres-data:
    driver: local

networks:
  auth-internal:
    driver: bridge
    internal: true
  auth-network:
    driver: bridge
    name: auth-network
  email-network:
    external: true
    name: email-network
