services:
  # ─── OPA (Open Policy Agent) ───
  authz-opa:
    image: openpolicyagent/opa:0.70.0-static
    container_name: authz-opa
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
      - /data
    ports:
      - "8182:8181"
    volumes:
      - ./config/opa/policies:/policies:ro
      - ./config/opa/data:/data:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - authz-network
    restart: unless-stopped

  # ─── Authorization Portal (Management UI) ───
  authz-portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: authz-portal
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
        reservations:
          memory: 128M
    ports:
      - "${AUTHZ_PORTAL_PORT:-3012}:3000"
    environment:
      OPA_URL: http://authz-opa:8181
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://host.docker.internal:8080}
    depends_on:
      authz-opa:
        condition: service_healthy
    networks:
      - authz-network
    restart: unless-stopped

networks:
  authz-network:
    driver: bridge
    name: authz-network
