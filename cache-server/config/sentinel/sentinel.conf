# Redis Sentinel Configuration
# Alternative HA setup (lighter than full cluster)
# Use when you need automatic failover but not data sharding
#
# Usage: Add sentinel services to docker-compose.yml with profile 'sentinel'
#   redis-sentinel-1:
#     image: redis:7.4-alpine
#     command: redis-sentinel /etc/redis/sentinel.conf
#     volumes:
#       - ./config/sentinel/sentinel.conf:/etc/redis/sentinel.conf
#     profiles: [sentinel]

port 26379
dir /tmp

# Monitor the master (redis-node-1)
sentinel monitor mymaster redis-node-1 6371 2
sentinel auth-user mymaster admin
sentinel auth-pass mymaster admin-secret

# Failover settings
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# Notification script (optional)
# sentinel notification-script mymaster /etc/redis/notify.sh

# ACL for sentinel connections
sentinel sentinel-user admin
sentinel sentinel-pass admin-secret
