worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Shared SSL settings
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;

    # ─── Security Headers ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Rate Limiting Zones ───
    # Portal UI: 30 req/s per IP, 10 MB shared memory
    limit_req_zone $binary_remote_addr zone=portal:10m rate=30r/s;
    # Portal API routes: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=portal_api:10m rate=10r/s;
    # Grafana dashboards: 50 req/s per IP (dashboards poll frequently)
    limit_req_zone $binary_remote_addr zone=grafana:10m rate=50r/s;

    # Custom 429 response
    limit_req_status 429;

    # ─── Kafka Portal (3001 → HTTPS 3501) ───
    server {
        listen 3501 ssl;
        location /api/ {
            limit_req zone=portal_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:3001;
        }
        location / {
            limit_req zone=portal burst=60 nodelay;
            proxy_pass http://host.docker.internal:3001;
        }
    }

    # ─── Cache Portal (3002 → HTTPS 3502) ───
    server {
        listen 3502 ssl;
        location /api/ {
            limit_req zone=portal_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:3002;
        }
        location / {
            limit_req zone=portal burst=60 nodelay;
            proxy_pass http://host.docker.internal:3002;
        }
    }

    # ─── Storage Portal (3004 → HTTPS 3504) ───
    server {
        listen 3504 ssl;
        location /api/ {
            limit_req zone=portal_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:3004;
        }
        location / {
            limit_req zone=portal burst=60 nodelay;
            proxy_pass http://host.docker.internal:3004;
        }
    }

    # ─── Gateway Portal (3006 → HTTPS 3506) ───
    server {
        listen 3506 ssl;
        location /api/ {
            limit_req zone=portal_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:3006;
        }
        location / {
            limit_req zone=portal burst=60 nodelay;
            proxy_pass http://host.docker.internal:3006;
        }
    }

    # ─── AuthZ Portal (3008 → HTTPS 3508) ───
    server {
        listen 3508 ssl;
        location /api/ {
            limit_req zone=portal_api burst=20 nodelay;
            proxy_pass http://host.docker.internal:3008;
        }
        location / {
            limit_req zone=portal burst=60 nodelay;
            proxy_pass http://host.docker.internal:3008;
        }
    }

    # ─── Grafana Kafka (3000 → HTTPS 3500) ───
    server {
        listen 3500 ssl;
        location / {
            limit_req zone=grafana burst=100 nodelay;
            proxy_pass http://host.docker.internal:3000;
        }
    }

    # ─── Grafana Cache (3003 → HTTPS 3503) ───
    server {
        listen 3503 ssl;
        location / {
            limit_req zone=grafana burst=100 nodelay;
            proxy_pass http://host.docker.internal:3003;
        }
    }

    # ─── Grafana Storage (3005 → HTTPS 3505) ───
    server {
        listen 3505 ssl;
        location / {
            limit_req zone=grafana burst=100 nodelay;
            proxy_pass http://host.docker.internal:3005;
        }
    }
}
