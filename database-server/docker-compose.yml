services:
  # ─── Shared PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
        reservations:
          memory: 256M
    environment:
      POSTGRES_USER: ${PG_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-postgres-admin-secret}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
      - ./config/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${PG_PORT:-5432}:5432"
    networks:
      - db-internal
      - db-network
    restart: unless-stopped

  # ─── pgAdmin (Database Management UI) ───
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shared-pgadmin
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-internal
      - db-network
    profiles:
      - admin
      - full
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  db-internal:
    driver: bridge
    internal: true
  db-network:
    driver: bridge
    name: db-network
