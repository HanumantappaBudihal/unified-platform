# ============================================
# Alertmanager Configuration
# Routes alerts from Prometheus to notification channels
# ============================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'email-mailpit:1025'
  smtp_from: 'kafka-alerts@infrastructure.local'
  smtp_require_tls: false

route:
  # Default receiver
  receiver: "default"
  # Group alerts by these labels
  group_by: ["alertname", "severity", "cluster"]
  # Wait before sending grouped alerts
  group_wait: 30s
  # Wait before sending new alerts in the same group
  group_interval: 5m
  # Wait before re-sending a resolved alert
  repeat_interval: 4h

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → normal notification
    - match:
        severity: warning
      receiver: "default"
      repeat_interval: 4h

receivers:
  # Default: log to stdout (visible in docker logs)
  - name: "default"
    # Uncomment and configure for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#kafka-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true

    email_configs:
      - to: 'ops-team@infrastructure.local'
        send_resolved: true

  # Critical: same channels but with higher urgency
  - name: "critical"
    email_configs:
      - to: 'ops-team@infrastructure.local'
        send_resolved: true

# Inhibition rules: suppress lower-severity alerts when higher ones fire
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster"]
