// JAAS configuration for Kafka SASL/SCRAM authentication
// Used in Phase 4 (Security) when --secure profile is enabled
//
// NOTE: Credentials are injected via environment variables in docker-compose.yml
// The KAFKA_OPTS env var points to this file, and the password below
// should match KAFKA_ADMIN_PASSWORD in your .env file.
// TODO: For production, generate this file dynamically from env vars at startup.

KafkaServer {
    org.apache.kafka.common.security.scram.ScramLoginModule required
    username="${KAFKA_ADMIN_USER}"
    password="${KAFKA_ADMIN_PASSWORD}";
};
