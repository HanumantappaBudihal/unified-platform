global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Kafka broker JMX metrics
  - job_name: "kafka-jmx"
    static_configs:
      - targets: ["kafka:7071"]
        labels:
          cluster: "kafka-central"
          component: "broker"

  # Kafka Exporter - consumer group lag, topic offsets
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          cluster: "kafka-central"
          component: "exporter"

  # Kafka Connect
  - job_name: "kafka-connect"
    static_configs:
      - targets: ["kafka-connect:8083"]
        labels:
          cluster: "kafka-central"
          component: "connect"
