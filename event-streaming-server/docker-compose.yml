##############################################################
# Centralized Kafka Server - Docker Compose
#
# Phase 1: Kafka (KRaft) + Schema Registry + Kafka UI + REST Proxy
# Phase 2: Kafka Connect                    (--profile connect)
# Phase 3: Prometheus + Grafana + Alerting  (--profile monitoring)
# Phase 4: SASL/SCRAM Security              (--profile secure)
#
# Usage:
#   Core only:       docker compose up -d
#   + Connect:       docker compose --profile connect up -d
#   + Monitoring:    docker compose --profile monitoring up -d
#   + Security:      docker compose --profile secure up -d
#   Full:            docker compose --profile connect --profile monitoring up -d
##############################################################

services:

  # ============================================
  # PHASE 1: Core Infrastructure
  # ============================================

  # --- Apache Kafka Broker (KRaft Mode) ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-central
    hostname: kafka
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
          pids: 500
        reservations:
          memory: 512M
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "19092:19092"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}

      # Listeners — INTERNAL for Docker/localhost, EXTERNAL for other devices on the network
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${HOST_IP:-192.168.11.96}:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Broker settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Governance: Disable auto topic creation - force explicit creation
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Log settings
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

    volumes:
      - ./data/kafka:/var/lib/kafka/data
    networks:
      - kafka-network
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --- Confluent Schema Registry ---
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: kafka-schema-registry
    hostname: schema-registry
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 200
        reservations:
          memory: 256M
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # Governance: Enforce BACKWARD compatibility by default
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --- Confluent REST Proxy (HTTP API for Kafka) ---
  kafka-rest-proxy:
    image: confluentinc/cp-kafka-rest:7.7.1
    container_name: kafka-rest-proxy
    hostname: kafka-rest-proxy
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 200
        reservations:
          memory: 256M
    ports:
      - "${KAFKA_REST_PROXY_PORT:-8082}:8082"
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest-proxy
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_REST_CONSUMER_REQUEST_TIMEOUT_MS: 30000
      # CORS: Restrict to known portal origins
      KAFKA_REST_ACCESS_CONTROL_ALLOW_ORIGIN: "http://localhost:3001,http://localhost:8080,http://localhost:3006"
      KAFKA_REST_ACCESS_CONTROL_ALLOW_METHODS: "GET,POST,PUT,DELETE"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - kafka-network
    healthcheck:
      test: curl -f http://localhost:8082/topics || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --- Kafbat UI (Kafka Management Dashboard with RBAC) ---
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.0.0
    container_name: kafka-ui
    hostname: kafka-ui
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 200
        reservations:
          memory: 256M
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"

      # Cluster configuration
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:-kafka-central}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: kafka-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      KAFKA_CLUSTERS_0_METRICS_PORT: 7071
      KAFKA_CLUSTERS_0_METRICS_TYPE: JMX

      # Governance: Topic name validation regex
      KAFKA_CLUSTERS_0_MASKING_POLICIES: ""
      TOPIC_DATA_DEFAULTSERDECLASS: "String"

      # Authentication: Basic Auth
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_ADMIN_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_ADMIN_PASSWORD:-admin123}

      # Audit logging
      LOGGING_LEVEL_COM_PROVECTUS_KAFKA_UI_SERVICE_AUDIT: INFO
    volumes:
      - ./config/kafka-ui/roles.yml:/etc/kafka-ui/roles.yml:ro
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - kafka-network

  # --- Kafka Portal (Next.js Management UI) ---
  kafka-portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: kafka-portal
    hostname: kafka-portal
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
        reservations:
          memory: 128M
    ports:
      - "3001:3001"
    environment:
      KAFKA_REST_PROXY_URL: http://kafka-rest-proxy:8082
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # Internal URLs (server-side health checks via Docker network)
      KAFKA_UI_URL_INTERNAL: http://kafka-ui:8080
      GRAFANA_URL_INTERNAL: http://grafana:3000
      PROMETHEUS_URL_INTERNAL: http://prometheus:9090
      ALERTMANAGER_URL_INTERNAL: http://alertmanager:9093
      # External URLs (client-side iframe embedding via browser)
      KAFKA_UI_URL: http://localhost:8080
      GRAFANA_URL: http://localhost:3000
      PROMETHEUS_URL: http://localhost:9090
      ALERTMANAGER_URL: http://localhost:9094
    depends_on:
      kafka:
        condition: service_healthy
      kafka-rest-proxy:
        condition: service_healthy
    networks:
      - kafka-network
    profiles:
      - portal

  # ============================================
  # PHASE 2: Kafka Connect
  # ============================================

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.7.1
    container_name: kafka-connect
    hostname: kafka-connect
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
          pids: 300
        reservations:
          memory: 512M
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: kafka-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      # Dead Letter Queue defaults for connectors
      CONNECT_ERRORS_TOLERANCE: all
      CONNECT_ERRORS_DEADLETTERQUEUE_TOPIC_NAME: _connect-dlq
      CONNECT_ERRORS_DEADLETTERQUEUE_TOPIC_REPLICATION_FACTOR: 1
      CONNECT_ERRORS_DEADLETTERQUEUE_CONTEXT_HEADERS_ENABLE: "true"
    volumes:
      - ./config/connect/plugins:/usr/share/confluent-hub-components
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - kafka-network
    profiles:
      - connect

  # ============================================
  # PHASE 3: Monitoring (Prometheus + Grafana)
  # ============================================

  # --- Kafka Exporter (Consumer Group Lag Metrics) ---
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    hostname: kafka-exporter
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 50
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --topic.filter=.*
      - --group.filter=.*
      - --log.enable-sarama=false
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kafka-prometheus
    hostname: prometheus
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 100
        reservations:
          memory: 256M
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    profiles:
      - monitoring

  # --- Alertmanager (Alert Routing) ---
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kafka-alertmanager
    hostname: alertmanager
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 50
    ports:
      - "9094:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    networks:
      - kafka-network
      - email-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: kafka-grafana
    hostname: grafana
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 100
        reservations:
          memory: 128M
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      # Grafana alerting via Alertmanager
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Allow iframe embedding in the portal
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kafka-network
    profiles:
      - monitoring

  # ============================================
  # PHASE 4: Secured Kafka Broker (SASL/SCRAM)
  # ============================================

  kafka-secure:
    image: apache/kafka:3.9.0
    container_name: kafka-central-secure
    hostname: kafka
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
          pids: 500
        reservations:
          memory: 512M
    ports:
      - "9095:9095"
      - "9096:9096"
      - "7072:7072"
    entrypoint:
      - /bin/bash
      - -c
      - |
        cat > /tmp/kafka-server-jaas.conf <<EOF
        KafkaServer {
            org.apache.kafka.common.security.scram.ScramLoginModule required
            username="$$KAFKA_ADMIN_USER"
            password="$$KAFKA_ADMIN_PASSWORD";
        };
        EOF
        exec /etc/kafka/docker/run
    environment:
      KAFKA_ADMIN_USER: ${KAFKA_ADMIN_USER:-admin}
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD:-admin-secret}

      # KRaft settings
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 2@kafka:9096
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}

      # Listeners - SASL_SSL for app clients, CONTROLLER for internal
      KAFKA_LISTENERS: SASL_SSL://0.0.0.0:9095,CONTROLLER://0.0.0.0:9096
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_SSL

      # SASL/SCRAM Configuration
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      KAFKA_OPTS: -Djava.security.auth.login.config=/tmp/kafka-server-jaas.conf

      # SSL/TLS Configuration
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/certs/server.p12
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_KEYSTORE_PASSWORD:-changeit}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_KEYSTORE_PASSWORD:-changeit}
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/certs/server.p12
      KAFKA_SSL_TRUSTSTORE_TYPE: PKCS12
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_KEYSTORE_PASSWORD:-changeit}
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      # ACL Authorizer - deny by default, require explicit ACLs
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: User:${KAFKA_ADMIN_USER:-admin}

      # Broker settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Log settings
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - ./data/kafka-secure:/var/lib/kafka/data
      - ../certs/kafka:/etc/kafka/certs:ro
    networks:
      - kafka-network
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9095 --command-config /tmp/ssl-client.properties > /dev/null 2>&1 || /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9095 > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    profiles:
      - secure

# ============================================
# Volumes
# ============================================
# ============================================
# Network
# ============================================
networks:
  kafka-network:
    name: kafka-network
    driver: bridge
  email-network:
    external: true
    name: email-network
