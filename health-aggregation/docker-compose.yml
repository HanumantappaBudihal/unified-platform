version: '3.8'

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
        reservations:
          memory: 128M
    ports:
      - "${UPTIME_KUMA_PORT:-3010}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "extra_headers=\"-H 'Accept: text/html'\" && node -e \"const http=require('http');http.get('http://127.0.0.1:3001',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - health-net

  health-portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: health-portal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
        reservations:
          memory: 128M
    ports:
      - "${PORTAL_PORT:-3009}:3000"
    environment:
      - UPTIME_KUMA_URL=${UPTIME_KUMA_URL:-http://uptime-kuma:3001}
      - NEXT_PUBLIC_UPTIME_KUMA_URL=http://localhost:${UPTIME_KUMA_PORT:-3010}
      - KAFKA_PORTAL_URL=${KAFKA_PORTAL_URL:-http://host.docker.internal:3001}
      - REDIS_PORTAL_URL=${REDIS_PORTAL_URL:-http://host.docker.internal:3002}
      - MINIO_PORTAL_URL=${MINIO_PORTAL_URL:-http://host.docker.internal:3004}
      - GATEWAY_PORTAL_URL=${GATEWAY_PORTAL_URL:-http://host.docker.internal:3006}
      - LOGGING_PORTAL_URL=${LOGGING_PORTAL_URL:-http://host.docker.internal:3007}
    depends_on:
      uptime-kuma:
        condition: service_healthy
    networks:
      - health-net

volumes:
  uptime-kuma-data:
    driver: local

networks:
  health-net:
    driver: bridge
