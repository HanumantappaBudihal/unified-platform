apiVersion: v1
kind: Namespace
metadata:
  name: data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: pg }
  template:
    metadata:
      labels: { app: pg }
    spec:
      containers:
        - name: pg
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_PASSWORD, value: spikepass }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_DB, value: postgres }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pg
  namespace: data
spec:
  selector: { app: pg }
  ports:
    - port: 5432
      targetPort: 5432
---
# Connection details provider-sql uses to reach the target Postgres.
apiVersion: v1
kind: Secret
metadata:
  name: pg-conn
  namespace: crossplane-system
type: Opaque
stringData:
  endpoint: pg.data.svc.cluster.local
  port: "5432"
  username: postgres
  password: spikepass
  sslmode: disable
