apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-keycloak-secret
  labels:
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  admin-user: {{ .Values.admin.user }}
  admin-password: {{ .Values.admin.password }}
  db-password: {{ .Values.database.password }}
