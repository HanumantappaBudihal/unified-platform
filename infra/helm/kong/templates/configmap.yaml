apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kong-config
  labels:
    app: kong
    release: {{ .Release.Name }}
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: example-service
        url: http://httpbin.org
        routes:
          - name: example-route
            paths:
              - /example
            strip_path: true

    plugins:
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
      - name: request-termination
        route: null
        service: null
        config:
          status_code: 404
          message: "Route not found"
