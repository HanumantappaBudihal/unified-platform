apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kong-admin
  labels:
    app: kong
    component: admin
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.admin.type }}
  ports:
    - port: {{ .Values.admin.port }}
      targetPort: admin
      protocol: TCP
      name: admin
  selector:
    app: kong
    release: {{ .Release.Name }}
