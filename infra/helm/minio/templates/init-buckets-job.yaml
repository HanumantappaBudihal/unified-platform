apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "minio-storage.fullname" . }}-init-buckets
  labels:
    {{- include "minio-storage.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "minio-storage.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init-buckets
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio-storage.fullname" . }}-secret
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "minio-storage.fullname" . }}-secret
                  key: rootPassword
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mc alias set myminio http://{{ include "minio-storage.fullname" . }}:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

              # Wait for MinIO to be ready
              until mc admin info myminio; do
                echo "Waiting for MinIO..."
                sleep 5
              done

              {{- range .Values.buckets }}
              # Bucket: {{ .name }}
              mc mb --ignore-existing myminio/{{ .name }}
              {{- if .versioning }}
              mc version enable myminio/{{ .name }}
              {{- end }}
              {{- if .quota }}
              mc quota set myminio/{{ .name }} --size {{ .quota }}
              {{- end }}
              {{- end }}

              echo "All buckets initialized."
