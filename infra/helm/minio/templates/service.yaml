apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio-storage.fullname" . }}-headless
  labels:
    {{- include "minio-storage.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "minio-storage.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio-storage.fullname" . }}
  labels:
    {{- include "minio-storage.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "minio-storage.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
