apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert-rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['{{ .Release.Name }}-alertmanager:9093']
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: kafka
        static_configs:
          - targets: ['kafka-exporter:9308']
      - job_name: redis
        static_configs:
          - targets: ['redis-exporter:9121']
      - job_name: minio
        metrics_path: /minio/v2/metrics/cluster
        static_configs:
          - targets: ['minio:9000']
      - job_name: kong
        static_configs:
          - targets: ['kong:8100']
      - job_name: postgres
        static_configs:
          - targets: ['postgres-exporter:9187']
      - job_name: platform-api
        metrics_path: /api/v1/health
        static_configs:
          - targets: ['platform-api:3020']
  alert-rules.yml: |
    groups:
      - name: platform
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ "{{ $labels.job }}" }} is down"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alertmanager-config
data:
  alertmanager.yml: |
    global:
      smtp_from: 'alertmanager@platform.local'
    route:
      receiver: default
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-datasources
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ .Release.Name }}-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboards
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Platform
        folder: Platform
        type: file
        options:
          path: /var/lib/grafana/dashboards
