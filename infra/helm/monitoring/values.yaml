prometheus:
  image:
    repository: prom/prometheus
    tag: "v2.51.0"
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits: { memory: "2Gi", cpu: "1" }
  retention: 30d
  storage:
    size: 100Gi
    storageClass: ""

alertmanager:
  image:
    repository: prom/alertmanager
    tag: "v0.27.0"
  resources:
    requests: { memory: "64Mi", cpu: "50m" }
    limits: { memory: "256Mi", cpu: "250m" }

grafana:
  image:
    repository: grafana/grafana
    tag: "10.4.0"
  adminUser: admin
  adminPassword: admin
  resources:
    requests: { memory: "128Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "500m" }
  storage:
    size: 10Gi
  ingress:
    enabled: false
    host: grafana.platform.example.com
