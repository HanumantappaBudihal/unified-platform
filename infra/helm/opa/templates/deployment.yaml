apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-opa
  labels:
    app: opa
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: opa
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: opa
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: opa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--log-level=info"
            - "/policies"
            - "/data"
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
            - name: data
              mountPath: /data
              readOnly: true
      volumes:
        - name: policies
          configMap:
            name: {{ .Release.Name }}-opa-policies
        - name: data
          configMap:
            name: {{ .Release.Name }}-opa-data
