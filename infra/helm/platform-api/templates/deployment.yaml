apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-platform-api
  labels:
    app: platform-api
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: platform-api
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: platform-api
        release: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podUser }}
        runAsGroup: {{ .Values.podUser }}
        fsGroup: {{ .Values.podUser }}
      containers:
        - name: platform-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3020
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-platform-api-config
            - secretRef:
                name: {{ .Release.Name }}-platform-api-secret
          env:
            - name: PLATFORM_API_PORT
              value: "3020"
          {{- if .Values.cnpg.enabled }}
            # Registry DB from the CloudNativePG cluster (overrides config/secret).
            - name: PLATFORM_DB_HOST
              value: {{ .Values.cnpg.clusterName }}-rw
            - name: PG_ADMIN_HOST
              value: {{ .Values.cnpg.clusterName }}-rw
            - name: PLATFORM_DB_USER
              valueFrom: { secretKeyRef: { name: {{ .Values.cnpg.clusterName }}-app, key: username } }
            - name: PLATFORM_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.cnpg.clusterName }}-app, key: password } }
            - name: PG_ADMIN_USER
              valueFrom: { secretKeyRef: { name: {{ .Values.cnpg.clusterName }}-superuser, key: username } }
            - name: PG_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.cnpg.clusterName }}-superuser, key: password } }
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3020
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
