apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-platform-api
  labels:
    app: platform-api
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: platform-api
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: platform-api
        release: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: platform-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3020
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-platform-api-config
            - secretRef:
                name: {{ .Release.Name }}-platform-api-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3020
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
