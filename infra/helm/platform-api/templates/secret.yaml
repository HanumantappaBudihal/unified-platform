apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-platform-api-secret
  labels:
    app: platform-api
    release: {{ .Release.Name }}
type: Opaque
data:
  PLATFORM_DB_PASSWORD: {{ .Values.secrets.platformDbPassword | default "" | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | default "" | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | default "" | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | default "" | b64enc | quote }}
  KEYCLOAK_ADMIN_USER: {{ .Values.secrets.keycloakAdminUser | default "" | b64enc | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | default "" | b64enc | quote }}
