apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-platform-api
  labels:
    app: platform-api
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3020
      protocol: TCP
      name: http
  selector:
    app: platform-api
    release: {{ .Release.Name }}
