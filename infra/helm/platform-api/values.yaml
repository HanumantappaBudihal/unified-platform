image:
  repository: idp/platform-api
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

# Wire the registry DB to a CloudNativePG cluster. When enabled, DB host + creds
# come from the CNPG-generated services/secrets ({cluster}-rw, {cluster}-app,
# {cluster}-superuser) instead of the static config/secret above.
cnpg:
  enabled: false
  clusterName: platform-db

# uid/gid the container runs as (node:alpine "node" user) — required for runAsNonRoot.
podUser: 1000

# Static secrets for the non-CNPG path. When cnpg.enabled, the DB creds are sourced
# from the CNPG secrets instead and these may stay empty.
secrets:
  platformDbPassword: ""
  redisPassword: ""
  minioAccessKey: ""
  minioSecretKey: ""
  keycloakAdminUser: ""
  keycloakAdminPassword: ""

service:
  type: ClusterIP
  port: 3020

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  platformDbHost: postgres
  platformDbPort: "5432"
  platformDbName: platform_db
  platformDbUser: platform_user
  redisHost: redis
  redisPort: "6379"
  kafkaBrokers: kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092
  minioEndpoint: minio
  minioPort: "9000"
  keycloakUrl: http://keycloak:8080
  opaUrl: http://opa:8181
  kongAdminUrl: http://kong:8001

ingress:
  enabled: false
  host: api.platform.example.com
