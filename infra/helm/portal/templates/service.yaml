apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-portal
  labels:
    app: {{ .Release.Name }}-portal
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-portal
