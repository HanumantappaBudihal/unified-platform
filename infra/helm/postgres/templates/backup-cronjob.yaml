{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "postgres.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              env:
                - name: PGHOST
                  value: {{ include "postgres.fullname" . }}
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "postgres.fullname" . }}-secret
                      key: postgres-password
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backups"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/platform_db-${TIMESTAMP}.sql.gz"

                  mkdir -p ${BACKUP_DIR}

                  echo "Starting backup of platform_db at ${TIMESTAMP}..."
                  pg_dump -h $PGHOST -U $PGUSER -d platform_db | gzip > ${BACKUP_FILE}

                  echo "Backup complete: ${BACKUP_FILE}"
                  ls -lh ${BACKUP_FILE}

                  echo "Cleaning up backups older than ${RETENTION_DAYS} days..."
                  find ${BACKUP_DIR} -name "platform_db-*.sql.gz" -mtime +${RETENTION_DAYS} -delete

                  echo "Remaining backups:"
                  ls -lh ${BACKUP_DIR}/
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ include "postgres.fullname" . }}-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postgres.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.storage.storageClass }}
  storageClassName: {{ .Values.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
{{- end }}
