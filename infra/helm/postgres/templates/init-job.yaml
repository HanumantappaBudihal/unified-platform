apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "postgres.fullname" . }}-init
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: PGHOST
              value: {{ include "postgres.fullname" . }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.fullname" . }}-secret
                  key: postgres-password
            - name: PLATFORM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.fullname" . }}-secret
                  key: platform-db-password
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                sleep 2
              done

              echo "Creating platform_db database and user..."
              psql -h $PGHOST -U $PGUSER -c "
                SELECT 'CREATE DATABASE platform_db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'platform_db');
              " | psql -h $PGHOST -U $PGUSER

              psql -h $PGHOST -U $PGUSER -c "
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'platform_user') THEN
                    CREATE ROLE platform_user WITH LOGIN PASSWORD '$PLATFORM_DB_PASSWORD';
                  END IF;
                END
                \$\$;
              "

              psql -h $PGHOST -U $PGUSER -c "GRANT ALL PRIVILEGES ON DATABASE platform_db TO platform_user;"

              echo "Creating schema and tables..."
              psql -h $PGHOST -U $PGUSER -d platform_db -c "
                CREATE TABLE IF NOT EXISTS platform_apps (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(255) NOT NULL UNIQUE,
                  description TEXT,
                  repository_url VARCHAR(512),
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                  updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
                );

                CREATE TABLE IF NOT EXISTS platform_app_resources (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  app_id UUID NOT NULL REFERENCES platform_apps(id) ON DELETE CASCADE,
                  resource_type VARCHAR(100) NOT NULL,
                  resource_name VARCHAR(255) NOT NULL,
                  config JSONB DEFAULT '{}',
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                  updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
                );

                CREATE TABLE IF NOT EXISTS platform_environments (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(100) NOT NULL UNIQUE,
                  description TEXT,
                  is_production BOOLEAN DEFAULT FALSE,
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                  updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
                );

                CREATE TABLE IF NOT EXISTS platform_teams (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(255) NOT NULL UNIQUE,
                  description TEXT,
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                  updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
                );

                CREATE TABLE IF NOT EXISTS platform_team_members (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  team_id UUID NOT NULL REFERENCES platform_teams(id) ON DELETE CASCADE,
                  user_id VARCHAR(255) NOT NULL,
                  role VARCHAR(50) NOT NULL DEFAULT 'member',
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                  UNIQUE(team_id, user_id)
                );

                CREATE TABLE IF NOT EXISTS platform_audit_log (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  actor VARCHAR(255) NOT NULL,
                  action VARCHAR(100) NOT NULL,
                  resource_type VARCHAR(100) NOT NULL,
                  resource_id VARCHAR(255),
                  details JSONB DEFAULT '{}',
                  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
                );

                CREATE INDEX IF NOT EXISTS idx_audit_log_created_at ON platform_audit_log(created_at);
                CREATE INDEX IF NOT EXISTS idx_audit_log_actor ON platform_audit_log(actor);
                CREATE INDEX IF NOT EXISTS idx_app_resources_app_id ON platform_app_resources(app_id);
                CREATE INDEX IF NOT EXISTS idx_team_members_team_id ON platform_team_members(team_id);
              "

              echo "Seeding environments..."
              psql -h $PGHOST -U $PGUSER -d platform_db -c "
                INSERT INTO platform_environments (name, description, is_production)
                VALUES
                  ('dev', 'Development environment', false),
                  ('staging', 'Staging environment', false),
                  ('prod', 'Production environment', true)
                ON CONFLICT (name) DO NOTHING;
              "

              echo "Granting table permissions to platform_user..."
              psql -h $PGHOST -U $PGUSER -d platform_db -c "
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO platform_user;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO platform_user;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO platform_user;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO platform_user;
              "

              echo "Database initialization complete."
