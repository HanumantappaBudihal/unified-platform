# Platform registry database as a CloudNativePG HA cluster:
# 1 primary + 2 hot-standby replicas with automated failover (unsupervised),
# replacing the single `shared-postgres`. Resources are sized to also run on kind.
#
# Operator install (once per cluster):
#   kubectl apply --server-side -f \
#     https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.1.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: platform-data
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-db
  namespace: platform-data
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised      # auto-failover without manual approval

  bootstrap:
    initdb:
      database: platform_db
      owner: platform_user                 # CNPG generates the `platform-db-app` secret

  postgresql:
    parameters:
      max_connections: "200"

  storage:
    size: 256Mi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

  # Continuous WAL archiving + PITR to object storage (MinIO). Uncomment in prod;
  # needs a Secret with the S3 creds. Enables `kubectl cnpg backup` + point-in-time
  # recovery — the BC/DR control for SOC2.
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://backups/platform-db
  #     endpointURL: http://storage-nginx.storage:9000
  #     s3Credentials:
  #       accessKeyId:     { name: minio-creds, key: ACCESS_KEY_ID }
  #       secretAccessKey: { name: minio-creds, key: SECRET_ACCESS_KEY }
  #   retentionPolicy: "30d"
