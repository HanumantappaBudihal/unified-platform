---
# PostgreSQL: only Platform API and Keycloak can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-api
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 5432
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
      ports:
        - port: 9187
---
# Redis: only Platform API can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-access
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-api
      ports:
        - port: 6379
    - from:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
      ports:
        - port: 9121
---
# Kafka: only Platform API can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-access
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-api
      ports:
        - port: 9092
    - from:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
      ports:
        - port: 9308
        - port: 7071
---
# MinIO: only Platform API can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-access
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-api
      ports:
        - port: 9000
    - from:
        - namespaceSelector:
            matchLabels:
              environment: monitoring
      ports:
        - port: 9000
