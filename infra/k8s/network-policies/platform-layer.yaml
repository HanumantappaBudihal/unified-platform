---
# Portal: Kong (external traffic) can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-access
spec:
  podSelector:
    matchLabels:
      app: portal
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kong
      ports:
        - port: 3000
    # Istio ingress gateway
    - from:
        - namespaceSelector:
            matchLabels:
              istio: system
      ports:
        - port: 3000
---
# Kong: accepts external traffic via ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-access
spec:
  podSelector:
    matchLabels:
      app: kong
  policyTypes:
    - Ingress
  ingress:
    # External proxy traffic
    - ports:
        - port: 8000
        - port: 8443
---
# OPA: Kong needs policy checks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opa-access
spec:
  podSelector:
    matchLabels:
      app: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kong
      ports:
        - port: 8181
