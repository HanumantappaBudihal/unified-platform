# Kafka HA via Strimzi (KRaft mode, no ZooKeeper): 3 combined controller+broker
# nodes with replication.factor=3 and min.insync.replicas=2 — replacing the single
# broker (RF=1) flagged in production-readiness-gaps.md.
#
# Operator install (once):
#   kubectl create namespace kafka
#   kubectl apply -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: pool-a
  namespace: kafka
  labels:
    strimzi.io/cluster: platform-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi
        deleteClaim: false
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: platform-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # HA: every internal/topic default replicated 3x, writes need 2 in-sync.
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      unclean.leader.election.enable: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Example HA topic (the platform/tenant topic golden-path uses these settings).
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: platform.events
  namespace: kafka
  labels:
    strimzi.io/cluster: platform-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "604800000"
