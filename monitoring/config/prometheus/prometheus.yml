global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ─── Prometheus self-monitoring ───
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ─── Kafka (Event Streaming) ───
  - job_name: kafka-jmx
    static_configs:
      - targets: ['kafka-1:7071', 'kafka-2:7071', 'kafka-3:7071']
        labels:
          service: kafka
    scrape_interval: 10s

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: kafka

  # ─── Redis (Cache) ───
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis

  # ─── MinIO (Object Storage) ───
  - job_name: minio-cluster
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio-1:9000', 'minio-2:9000', 'minio-3:9000', 'minio-4:9000']
        labels:
          service: minio

  - job_name: minio-node
    metrics_path: /minio/v2/metrics/node
    static_configs:
      - targets: ['minio-1:9000', 'minio-2:9000', 'minio-3:9000', 'minio-4:9000']
        labels:
          service: minio

  - job_name: minio-bucket
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets: ['minio-1:9000', 'minio-2:9000', 'minio-3:9000', 'minio-4:9000']
        labels:
          service: minio

  # ─── Kong (API Gateway) ───
  - job_name: kong
    static_configs:
      - targets: ['kong:8100']
        labels:
          service: kong

  # ─── PostgreSQL ───
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres

  # ─── Keycloak ───
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-keycloak:8080']
        labels:
          service: keycloak

  # ─── Platform API ───
  - job_name: platform-api
    metrics_path: /api/v1/health
    static_configs:
      - targets: ['platform-api:3020']
        labels:
          service: platform
