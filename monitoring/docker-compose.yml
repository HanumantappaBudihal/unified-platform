services:
  # ─── Prometheus (unified) ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: platform-prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring-internal
      - kafka-network
      - cache-network
      - storage-net
      - kong-internal
      - db-network
    restart: unless-stopped

  # ─── Alertmanager (unified) ───
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: platform-alertmanager
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager:/etc/alertmanager:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - monitoring-internal
      - email-network
    restart: unless-stopped

  # ─── Grafana (unified) ───
  grafana:
    image: grafana/grafana:10.4.0
    container_name: platform-grafana
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "3051:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3050
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-internal
    restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  monitoring-internal:
    driver: bridge
    name: monitoring-network
  kafka-network:
    external: true
    name: kafka-network
  cache-network:
    external: true
    name: cache-network
  storage-net:
    external: true
    name: storage-net
  kong-internal:
    external: true
    name: kong-internal
  db-network:
    external: true
    name: db-network
  email-network:
    external: true
    name: email-network
