worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 0;
    proxy_buffering off;
    proxy_request_buffering off;

    # ─── Rate Limiting Zones ───
    # S3 API: 100 req/s per IP (high throughput for object operations)
    limit_req_zone $binary_remote_addr zone=s3_api:10m rate=100r/s;
    # MinIO Console: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=minio_ui:10m rate=30r/s;
    limit_req_status 429;

    # SSL settings
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    upstream minio_s3 {
        least_conn;
        server minio-1:9000;
        server minio-2:9000;
        server minio-3:9000;
        server minio-4:9000;
    }

    upstream minio_console {
        least_conn;
        server minio-1:9001;
        server minio-2:9001;
        server minio-3:9001;
        server minio-4:9001;
    }

    # S3 API — HTTPS on 9000
    server {
        listen 9000 ssl;
        server_name _;

        ignore_invalid_headers off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;

        location / {
            limit_req zone=s3_api burst=200 nodelay;
            proxy_pass http://minio_s3;
        }
    }

    # Console — HTTPS on 9001
    server {
        listen 9001 ssl;
        server_name _;

        ignore_invalid_headers off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        location / {
            limit_req zone=minio_ui burst=60 nodelay;
            proxy_pass http://minio_console;
        }
    }
}
