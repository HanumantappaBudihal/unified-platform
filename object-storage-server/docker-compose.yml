version: "3.8"

x-minio-common: &minio-common
  image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
  command: server --console-address ":9001" http://minio-{1...4}/data
  environment:
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin-secret-key}
    MINIO_PROMETHEUS_AUTH_TYPE: public
  healthcheck:
    test: ["CMD", "mc", "ready", "local"]
    interval: 10s
    timeout: 5s
    retries: 5
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        memory: 2G
        cpus: '2.0'
      reservations:
        memory: 512M
  networks:
    - storage-net

services:
  # ─── MinIO Nodes (Erasure Coding 2+2) ───
  minio-1:
    <<: *minio-common
    container_name: minio-1
    hostname: minio-1
    volumes:
      - minio-data-1:/data
    ports:
      - "9010:9000"

  minio-2:
    <<: *minio-common
    container_name: minio-2
    hostname: minio-2
    volumes:
      - minio-data-2:/data
    ports:
      - "9011:9000"

  minio-3:
    <<: *minio-common
    container_name: minio-3
    hostname: minio-3
    volumes:
      - minio-data-3:/data
    ports:
      - "9012:9000"

  minio-4:
    <<: *minio-common
    container_name: minio-4
    hostname: minio-4
    volumes:
      - minio-data-4:/data
    ports:
      - "9013:9000"

  # ─── Nginx Load Balancer ───
  nginx:
    image: nginx:1.27-alpine
    container_name: storage-nginx
    hostname: storage-nginx
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certs/nginx/server.crt:/etc/nginx/certs/server.crt:ro
      - ../certs/nginx/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      minio-1:
        condition: service_healthy
      minio-2:
        condition: service_healthy
      minio-3:
        condition: service_healthy
      minio-4:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - storage-net

  # ─── MinIO Client (Init buckets, users, policies) ───
  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: minio-init
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      nginx:
        condition: service_started
    entrypoint: /bin/sh
    command: /init/init-buckets.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin-secret-key}
      MINIO_DOCUMENT_SVC_KEY: ${MINIO_DOCUMENT_SVC_KEY:-document-svc-key}
      MINIO_DOCUMENT_SVC_SECRET: ${MINIO_DOCUMENT_SVC_SECRET:-document-svc-secret}
      MINIO_MEDIA_SVC_KEY: ${MINIO_MEDIA_SVC_KEY:-media-svc-key}
      MINIO_MEDIA_SVC_SECRET: ${MINIO_MEDIA_SVC_SECRET:-media-svc-secret}
      MINIO_HR_PORTAL_KEY: ${MINIO_HR_PORTAL_KEY:-hr-portal-key}
      MINIO_HR_PORTAL_SECRET: ${MINIO_HR_PORTAL_SECRET:-hr-portal-secret}
      MINIO_ANALYTICS_SVC_KEY: ${MINIO_ANALYTICS_SVC_KEY:-analytics-svc-key}
      MINIO_ANALYTICS_SVC_SECRET: ${MINIO_ANALYTICS_SVC_SECRET:-analytics-svc-secret}
    volumes:
      - ./scripts/init-buckets.sh:/init/init-buckets.sh:ro
    networks:
      - storage-net

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: storage-prometheus
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    ports:
      - "9097:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks:
      - storage-net
    profiles:
      - monitoring
      - full

  grafana:
    image: grafana/grafana:11.1.0
    container_name: storage-grafana
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/custom-dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - storage-net
    profiles:
      - monitoring
      - full

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: storage-alertmanager
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "9098:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - storage-net
      - email-network
    profiles:
      - monitoring
      - full

  # ─── Storage Portal ───
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: storage-portal
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    ports:
      - "3004:3000"
    environment:
      MINIO_ENDPOINT: storage-nginx
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin-secret-key}
      MINIO_CONSOLE_URL: http://storage-nginx:9001
      GRAFANA_URL: http://storage-grafana:3000
      PROMETHEUS_URL: http://storage-prometheus:9090
      ALERTMANAGER_URL: http://storage-alertmanager:9093
      GRAFANA_URL_EXTERNAL: http://localhost:3005
      PROMETHEUS_URL_EXTERNAL: http://localhost:9097
      ALERTMANAGER_URL_EXTERNAL: http://localhost:9098
      MINIO_CONSOLE_URL_EXTERNAL: http://localhost:9001
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped
    networks:
      - storage-net
    profiles:
      - portal
      - full

volumes:
  minio-data-1:
  minio-data-2:
  minio-data-3:
  minio-data-4:
  prometheus-data:
  grafana-data:

networks:
  storage-net:
    driver: bridge
  email-network:
    external: true
    name: email-network
