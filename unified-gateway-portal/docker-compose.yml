services:
  gateway:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: infra-gateway
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
          pids: 100
        reservations:
          memory: 128M
    # pids_limit: 100  # conflicts with deploy.resources.limits
    ports:
      - "3006:3000"
    environment:
      PLATFORM_API_URL: http://host.docker.internal:3020
      # Superadmin fallback for the control-plane API when no tenant is signed in.
      # In production, drop this and require tenant sign-in / SSO instead.
      PLATFORM_API_TOKEN: super-admin-token-xyz
      KAFKA_PORTAL_URL: http://host.docker.internal:3001
      REDIS_PORTAL_URL: http://host.docker.internal:3002
      MINIO_PORTAL_URL: http://host.docker.internal:3004
      KAFKA_UI_URL: http://host.docker.internal:8080
      REDIS_INSIGHT_URL: http://host.docker.internal:5540
      MINIO_CONSOLE_URL: http://host.docker.internal:9001
      KAFKA_GRAFANA_URL: http://host.docker.internal:3000
      REDIS_GRAFANA_URL: http://host.docker.internal:3003
      MINIO_GRAFANA_URL: http://host.docker.internal:3005
      KAFKA_PROMETHEUS_URL: http://host.docker.internal:9090
      REDIS_PROMETHEUS_URL: http://host.docker.internal:9091
      MINIO_PROMETHEUS_URL: http://host.docker.internal:9097
      # SSO via Keycloak (split browser/server endpoints for docker).
      NEXTAUTH_URL: http://localhost:3006
      NEXTAUTH_SECRET: dev-nextauth-secret-change-in-prod
      KEYCLOAK_ISSUER: http://localhost:8180/realms/platform
      KEYCLOAK_INTERNAL_ISSUER: http://host.docker.internal:8180/realms/platform
      KEYCLOAK_CLIENT_ID: gateway-portal
      KEYCLOAK_CLIENT_SECRET: gateway-portal-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
